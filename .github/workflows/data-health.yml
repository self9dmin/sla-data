name: Data health

# Monthly community-facing data-health check: flags broken SLA links and stale
# vendors, then keeps a single tracking issue up to date so contributors can act.

on:
  schedule:
    - cron: '0 8 1 * *'   # 08:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  data-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - id: check
        run: node scripts/data-health.cjs
      - name: Open or update tracking issue
        if: steps.check.outputs.count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('data-health-report.md', 'utf8');
            const title = 'Data health: broken SLA links and stale data';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'data-health',
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['data-health'] });
            }
      - name: Close tracking issue when all clear
        if: steps.check.outputs.count == 0
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Data health: broken SLA links and stale data';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'data-health',
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number,
                body: 'All clear: no broken SLA links and nothing past the 12-month freshness window as of this run.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, state: 'closed',
              });
            }
